<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameTracker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect>
            <line x1="6" y1="12" x2="10" y2="12"></line>
            <line x1="8" y1="10" x2="8" y2="14"></line>
            <line x1="15" y1="13" x2="15.01" y2="13"></line>
            <line x1="18" y1="11" x2="18.01" y2="11"></line>
          </svg>
        </div>
        <div class="logo-text">GAME<b>TRACKER</b></div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">BIBLIOTECA</div>

        <button class="nav-item active" data-filter="ALL">
          <span class="nav-icon">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
            >
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 12 12 17 22 12"></polyline>
              <polyline points="2 17 12 22 22 17"></polyline>
            </svg>
          </span>
          Todos os Jogos
          <span class="nav-count" id="count-all">0</span>
        </button>

        <button class="nav-item" data-filter="PLAYING">
          <span class="nav-icon">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linejoin="round"
            >
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </span>
          Jogando
          <span class="nav-count" id="count-playing">0</span>
        </button>

        <button class="nav-item" data-filter="COMPLETED">
          <span class="nav-icon">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
          </span>
          Zerados
          <span class="nav-count" id="count-completed">0</span>
        </button>

        <button class="nav-item" data-filter="BACKLOG">
          <span class="nav-icon">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"
              ></path>
            </svg>
          </span>
          Backlog
          <span class="nav-count" id="count-backlog">0</span>
        </button>

        <button class="nav-item" data-filter="PAUSED">
          <span class="nav-icon">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
            >
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </span>
          Pausados
          <span class="nav-count" id="count-paused">0</span>
        </button>

        <button class="nav-item" data-filter="DROPPED">
          <span class="nav-icon">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="15" y1="9" x2="9" y2="15"></line>
              <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
          </span>
          Dropados
          <span class="nav-count" id="count-dropped">0</span>
        </button>
      </nav>

      <!-- FOOTER PREMIUM DO JOGADOR -->
      <div class="sidebar-footer">
        <div class="user-avatar">G</div>
        <div class="user-meta">
          <span class="user-name">Jogador</span>
          <span class="user-status">Online</span>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sair">
          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-wrapper">
      <header class="topbar">
        <h1 class="page-title" id="page-title">TODOS OS JOGOS</h1>
        <div class="topbar-right">
          <div class="search-wrapper">
            <span class="search-icon">
              <svg
                viewBox="0 0 24 24"
                width="14"
                height="14"
                stroke="currentColor"
                stroke-width="2"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </span>
            <input
              type="text"
              id="search-input"
              class="search-input"
              placeholder="Buscar jogo..."
            />
          </div>
          <button class="btn-add" id="btn-add">+ Adicionar</button>
        </div>
      </header>

      <section class="content">
        <div id="games-grid" class="games-grid">
          <!-- Os cards serão injetados aqui via JS -->
        </div>
      </section>
    </main>

    <!-- MODAL DE ADICIONAR/EDITAR -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title">Novo Jogo</h2>
          <button class="modal-close" id="modal-close">
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <form id="game-form">
          <input type="hidden" id="game-id" />
          <div class="form-group">
            <label class="form-label">Título do Jogo</label>
            <input type="text" id="input-title" class="form-input" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Plataforma</label>
              <input
                type="text"
                id="input-platform"
                class="form-input"
                placeholder="Ex: PC, PS5"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Gênero</label>
              <input
                type="text"
                id="input-genre"
                class="form-input"
                placeholder="Ex: RPG, Ação"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Status</label>
              <select id="input-status" class="form-select">
                <option value="BACKLOG">Backlog</option>
                <option value="PLAYING">Jogando</option>
                <option value="PAUSED">Pausado</option>
                <option value="COMPLETED">Zerado</option>
                <option value="DROPPED">Dropado</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Nota (0 a 10)</label>
              <input
                type="number"
                id="input-rating"
                class="form-input"
                min="0"
                max="10"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">URL da Capa (Opcional)</label>
            <input
              type="url"
              id="input-cover"
              class="form-input"
              placeholder="Deixe em branco para buscar da Steam"
            />
          </div>
          <button type="submit" class="btn-submit">SALVAR JOGO</button>
        </form>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/script.js"></script>
  </body>
</html>
